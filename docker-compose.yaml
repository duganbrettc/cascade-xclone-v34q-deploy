services:
  db:
    build:
      context: ./db
    environment:
      POSTGRES_USER: xclone
      POSTGRES_PASSWORD: xclone
      POSTGRES_DB: xclone
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "xclone"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://xclone:xclone@db:5432/xclone?sslmode=disable
      PORT: "8080"

  web:
    build:
      context: ./web
    depends_on:
      api:
        condition: service_started
    ports:
      - "${HOST_PORT}:80"
